name: Master - Docker image artifact

on:
  push:
    branches:
      - master

concurrency:
  group: master-docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Exports a single-file docker archive we can upload as an artifact
      - name: Build image (artifact)
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: monpreparcours:master
          outputs: type=docker,dest=/tmp/monpreparcours-master.tar

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: monpreparcours-image-master
          path: /tmp/monpreparcours-master.tar
          retention-days: 7
