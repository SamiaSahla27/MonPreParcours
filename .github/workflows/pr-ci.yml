name: PR CI

on:
  pull_request:
    branches:
      - develop
      - staging
      - main

concurrency:
  group: pr-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend - build/lint/test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  front:
    name: Front - build/lint/test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Front
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: Front/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
